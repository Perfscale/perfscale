name: bench

# Engine benchmark on a fixed CI runner class, so numbers are comparable
# between runs (local machines vary too much). Results land in the job
# summary and as a downloadable artifact, and each run is compared against
# the previous successful run's bench-results.json (regression tracking).
on:
  workflow_dispatch:
    inputs:
      vus:
        description: "Virtual users per engine"
        default: "10"
      duration:
        description: "Run duration per engine (e.g. 30s, 1m)"
        default: "30s"
      runs:
        description: "hyperfine runs per scenario"
        default: "5"
      suites:
        description: "Suites to run (see scripts/bench.sh)"
        default: "overhead throughput startup scaling saturation yaml tls"
  schedule:
    # Daily drift check (04:23 UTC) — catches perf regressions between
    # releases. ~30min per run ≈ ~900 Actions-min/month; off-:00 to dodge
    # the top-of-hour scheduler herd.
    - cron: "23 4 * * *"

permissions:
  contents: read
  # Download the previous run's bench-results artifact for the delta table.
  actions: read

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends curl gnupg ca-certificates
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends k6

      - name: Install locust
        run: pipx install locust

      - name: Install hyperfine
        run: cargo install hyperfine --locked

      - name: Install GNU time
        run: sudo apt-get install -y --no-install-recommends time

      - name: Build perfscale (release)
        run: cargo build --release

      - name: Write environment summary
        run: |
          {
            echo '## Environment'
            echo '| | |'
            echo '|---|---|'
            echo "| OS | $(lsb_release -ds 2>/dev/null || uname -sr) ($(uname -m)) |"
            echo "| CPU | $(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | sed 's/^ *//') |"
            echo "| Threads | $(nproc) |"
            echo "| RAM | $(free -h | awk '/^Mem:/ {print $2}') |"
            echo "| Swap | $(free -h | awk '/^Swap:/ {print $2}') |"
            echo
            echo '## Software'
            echo '| | |'
            echo '|---|---|'
            echo "| perfscale | $(./target/release/perfscale --version) |"
            echo "| k6 | $(k6 version 2>/dev/null || echo 'not installed') |"
            echo "| locust | $(locust --version 2>/dev/null || echo 'not installed') |"
            echo "| hyperfine | $(hyperfine --version) |"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run benchmark suites
        env:
          VUS: ${{ github.event.inputs.vus || '10' }}
          DURATION: ${{ github.event.inputs.duration || '30s' }}
          RUNS: ${{ github.event.inputs.runs || '5' }}
          SUITES: ${{ github.event.inputs.suites || 'overhead throughput startup scaling saturation yaml tls' }}
        run: ./scripts/bench.sh

      - name: Micro-benchmarks (criterion)
        # Short measurement windows: precise enough for a drift check, and the
        # weekly job shouldn't spend more time on micro-benches than on the
        # end-to-end suites.
        run: |
          cargo bench -p perfscale-core --bench engine -- --warm-up-time 1 --measurement-time 3
          python3 scripts/bench_metrics.py criterion target/criterion bench-results.json bench-report.md

      - name: Publish report to job summary
        run: |
          {
            echo '## Benchmark results'
            echo
            cat bench-report.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Compare with previous run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prev=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/bench.yml/runs?status=success&per_page=1" \
            --jq '.workflow_runs[0].id' 2>/dev/null || true)
          if [ -z "$prev" ]; then
            echo "no previous successful run — skipping comparison"
            exit 0
          fi
          gh run download "$prev" --repo "$GITHUB_REPOSITORY" --name bench-report --dir prev-bench || true
          if [ ! -f prev-bench/bench-results.json ]; then
            echo "previous run has no bench-results.json — skipping comparison"
            exit 0
          fi
          python3 scripts/bench_compare.py prev-bench/bench-results.json bench-results.json \
            | tee -a bench-report.md >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v5
        with:
          name: bench-report
          path: |
            bench-report.md
            bench-results.json
          retention-days: 90
