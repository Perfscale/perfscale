name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      # k6 + locust — several tests exercise the real binaries end-to-end
      # (happy-path tests skip gracefully if a binary is missing, but CI
      # installs both so they actually run).
      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends curl gnupg ca-certificates
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends k6
      - name: Install locust
        run: pip install --no-cache-dir locust

      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features

      # Informational — not a merge gate, just visibility on where coverage is thin.
      - name: Coverage summary
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --locked
          cargo llvm-cov --all-features --workspace --summary-only
